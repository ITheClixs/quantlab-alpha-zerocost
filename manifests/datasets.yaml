schema_version: 1
description: >
  Candidate datasets for a quantitative finance model stack. The downloader estimates
  file sizes, sorts by size, and downloads enabled datasets while respecting the global
  budget in configs/stack.yaml.

defaults:
  repo_type: dataset
  enabled: true
  allow_patterns:
    - "*.parquet"
    - "*.csv"
    - "*.json"
    - "*.jsonl"
    - "*.txt"
    - "*.md"
    - "README*"
  ignore_patterns:
    - ".git*"
    - "*.png"
    - "*.jpg"
    - "*.jpeg"
    - "*.gif"
    - "*.mp4"
    - "*.zip"
    - "*.tar"
    - "*.tar.gz"

datasets:
  - id: Neil0930/quantitative_finance_dataset
    group: quant_instruction
    priority: 10
    license_hint: mit
    purpose: "Tiny quantitative-finance QA/instruction seed corpus."

  - id: VedantPadwal/quantitative-finance-reasoning
    group: quant_instruction
    priority: 20
    license_hint: unknown
    purpose: "Formula-heavy quantitative-finance reasoning prompts."

  - id: lumalik/Quant-Trading-Instruct
    group: quant_instruction
    priority: 30
    license_hint: unknown
    purpose: "Instruction examples around quantitative trading concepts."

  - id: vaquum/binance_btcusdt_1m_klines
    group: crypto_ohlcv
    priority: 100
    license_hint: unknown
    purpose: "BTCUSDT one-minute OHLCV, useful for baseline forecasting and labels."

  - id: h34v7/BTCUSDT_Binance_1min_2017-2025
    group: crypto_ohlcv
    priority: 110
    license_hint: mit
    purpose: "Long BTCUSDT one-minute OHLCV history for walk-forward validation."

  - id: 123olp/binance-futures-ohlcv-2018-2026
    group: crypto_futures_ohlcv
    priority: 120
    license_hint: mit
    purpose: "Binance futures OHLCV history for derivatives forecasting."

  - id: predict-quant/binance-future-orderbook
    group: crypto_orderbook
    priority: 200
    license_hint: apache-2.0
    purpose: "Binance futures order book data for order-flow imbalance and microstructure signals."

  - id: predict-quant/binance-spot-orderbook
    group: crypto_orderbook
    priority: 210
    license_hint: unknown
    purpose: "Binance spot order book data for spot/futures microstructure comparison."

  - id: mad0g4/l2_orderbook_binance
    group: crypto_orderbook
    priority: 220
    license_hint: unknown
    purpose: "L2 Binance order-book dataset candidate."

  - id: AdamAtractor/24_crypto_orderbook_30lvl
    group: crypto_orderbook
    priority: 230
    license_hint: cc-by-4.0
    purpose: "30-level crypto order-book data across instruments."

  - id: orion-research/binance-btcusdt-spot-trades
    group: crypto_trades
    priority: 300
    license_hint: unknown
    purpose: "BTCUSDT trade flow for signed-volume and trade-intensity features."

  - id: xxparthparekhxx/indian-stock-market-minute-data
    group: equity_intraday
    priority: 400
    license_hint: mit
    purpose: "Large equity minute/daily dataset for non-crypto market generalization."

  - id: voigtstefan/sp500
