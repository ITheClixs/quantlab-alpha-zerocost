data:
  jane_street_root: data/raw/huggingface/TnnnT0326__Jane_Street_Competition
  preprocessed_alt_root: data/raw/kaggle/datasets/saurabhshahane__jane-street-preprocessed-train
  synthetic_root: data/raw/kaggle/datasets/christoffer__synthetic-jane-street-dataset
  permanent_holdout_fraction: 0.20
  target_column: responder_6
  weight_column: weight
  group_column: date_id

cv:
  n_folds: 3
  purge_days: 2
  embargo_days: 2
  random_seed: 42

features:
  lag_windows: [1, 5]
  rolling_windows: [5]
  cross_sectional_ranks: true
  interaction_pairs_top_n: 10
  include_noise_feature: true

models:
  ridge:
    alpha_grid: [0.1, 1.0, 10.0]
  lightgbm:
    num_leaves: 31
    max_depth: -1
    learning_rate: 0.05
    n_estimators: 150
    early_stopping_rounds: 20
    feature_fraction: 0.85
    bagging_fraction: 0.8
  xgboost:
    max_depth: 5
    learning_rate: 0.05
    n_estimators: 150
    early_stopping_rounds: 20
    tree_method: hist
  catboost:
    depth: 6
    learning_rate: 0.05
    n_estimators: 150
    early_stopping_rounds: 20
  mlp:
    hidden_dims: [128, 64]
    dropout: 0.2
    learning_rate: 0.001
    batch_size: 1024
    max_epochs: 8
    patience: 2
    mixed_precision: true
  sequence:
    architecture: cnn1d
    seq_len: 16
    kernel_sizes: [3, 5]
    n_filters: 32
    max_epochs: 5
    learning_rate: 0.0005

stacking:
  method: linear
  fit_on: oof_predictions

optuna:
  trials_per_fold: 5
  pruner: median
  sampler: tpe

training_budget:
  profile: fast_interactive
  max_rows_recommended: 100000
  target_wall_clock_minutes: 15

success_gate:
  min_holdout_r2: 0.0
  max_fold_std_r2: 0.02
  min_ridge_baseline_improvement_pct: 0
