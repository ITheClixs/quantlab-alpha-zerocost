artifact_budget:
  max_total_gb: 150
  reserve_gb_for_processed_outputs: 0
  default_sort: size
  hard_ceiling_gb: 165
  counted_paths:
    - data/raw/huggingface
    - data/raw/kaggle
    - data/raw/papers
    - data/processed
    - models/huggingface

llm_runtime:
  primary_model_id: bartowski/Mistral-Small-Instruct-2409-GGUF
  primary_local_dir: models/huggingface/bartowski__Mistral-Small-Instruct-2409-GGUF
  fallback_model_id: TheBloke/finance-LLM-13B-GGUF
  fallback_local_dir: models/huggingface/TheBloke__finance-LLM-13B-GGUF
  preferred_quant: Q4_K_M
  context_tokens: 4096

bucket_budgets:
  hf_datasets: 50
  kaggle: 40
  models: 40
  papers_and_derived: 20

paths:
  raw_hf_root: data/raw/huggingface
  raw_paper_root: data/raw/papers
  raw_kaggle_root: data/raw/kaggle
  processed_market_root: data/processed/market
  processed_orderbook_root: data/processed/orderbook
  processed_research_root: data/processed/research
  model_root: models/huggingface
  reports_root: reports

market_preparation:
  horizons:
    - 1
    - 5
    - 15
    - 60
  volatility_windows:
    - 5
    - 20
    - 60
  triple_barrier:
    profit_take_return: 0.002
    stop_loss_return: -0.002
    max_horizon: 60

research_corpus:
  chunk_words: 420
  chunk_overlap_words: 80
  min_chunk_words: 80
  parquet_shard_target_mb: 256
  instruction_max_per_chunk: 3
  instruction_max_new_tokens: 256
  instruction_primary_model: Qwen/Qwen2.5-0.5B-Instruct
  instruction_fallback_model: roneneldan/TinyStories-33M
