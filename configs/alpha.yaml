data:
  jane_street_root: data/raw/huggingface/TnnnT0326__Jane_Street_Competition
  preprocessed_alt_root: data/raw/kaggle/datasets/saurabhshahane__jane-street-preprocessed-train
  synthetic_root: data/raw/kaggle/datasets/christoffer__synthetic-jane-street-dataset
  permanent_holdout_fraction: 0.20
  target_column: responder_6
  weight_column: weight
  group_column: date_id
  max_rows: 2000000

cv:
  n_folds: 5
  purge_days: 5
  embargo_days: 5
  random_seed: 42

features:
  lag_windows: [1, 2, 5, 10, 20]
  rolling_windows: [5, 20, 60]
  cross_sectional_ranks: true
  include_noise_feature: true

models:
  ridge:
    alpha: 1.0
  lightgbm:
    num_leaves: 63
    max_depth: -1
    learning_rate: 0.05
    n_estimators: 2000
    early_stopping_rounds: 100
    feature_fraction: 0.9
    bagging_fraction: 0.8
  xgboost:
    max_depth: 8
    learning_rate: 0.05
    n_estimators: 2000
    early_stopping_rounds: 100
    tree_method: hist
  catboost:
    depth: 12
    learning_rate: 0.05
    n_estimators: 2000
    early_stopping_rounds: 100
  mlp:
    hidden_dims: [512, 256, 128]
    dropout: 0.3
    learning_rate: 0.001
    batch_size: 1024
    max_epochs: 50
    patience: 5
    mixed_precision: true
  sequence:
    kernel_sizes: [3, 5, 7]
    n_filters: 64
    dropout: 0.2
    learning_rate: 0.0005
    batch_size: 1024
    max_epochs: 30
    patience: 4
    random_state: 42

stacker_alpha: 0.001
streaming: false
max_rows_streaming: 5000000
